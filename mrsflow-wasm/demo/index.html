<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mrsflow — browser demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
  h1 { margin: 0 0 .5rem; font-size: 1.2rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  textarea { width: 100%; height: 22rem; font-family: ui-monospace, monospace; font-size: .85rem; }
  pre { background: #f4f4f4; padding: .5rem; overflow: auto; max-height: 22rem; font-size: .8rem; }
  #status { white-space: pre-wrap; background: #222; color: #c8f0c8; padding: .5rem; font-family: ui-monospace, monospace; font-size: .8rem; min-height: 6rem; }
  button { padding: .5rem 1rem; font-size: 1rem; margin: .5rem 0; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  label { font-weight: bold; font-size: .9rem; display: block; margin-top: 1rem; }
</style>
</head>
<body>

<h1>mrsflow — browser demo</h1>
<p>Three parquets joined and expanded by an M query, evaluated entirely in the browser via WASM.</p>

<label>Status</label>
<pre id="status"></pre>

<button id="run" disabled>Run</button>

<div class="row">
  <div>
    <label for="source">M source (editable)</label>
    <textarea id="source" spellcheck="false"></textarea>
  </div>
  <div>
    <label for="result">Result (S-expression)</label>
    <pre id="result">—</pre>
  </div>
</div>

<script type="module">
import init, { run, version } from '/mrsflow-wasm/pkg/mrsflow_wasm.js';

const statusEl = document.getElementById('status');
const sourceEl = document.getElementById('source');
const resultEl = document.getElementById('result');
const runBtn = document.getElementById('run');

const log = (msg) => { statusEl.textContent += msg + '\n'; };

async function fetchBytes(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch ${url}: ${r.status}`);
  return new Uint8Array(await r.arrayBuffer());
}

async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch ${url}: ${r.status}`);
  return await r.text();
}

let inputs = null;

(async () => {
  log('loading wasm…');
  await init();
  log(`wasm loaded — mrsflow-wasm v${version()}`);

  log('fetching parquets…');
  const t0 = performance.now();
  const [analysis, customer, product] = await Promise.all([
    fetchBytes('/parqs/analysis-mini.parquet'),
    fetchBytes('/parqs/customer-mini.parquet'),
    fetchBytes('/parqs/product-mini.parquet'),
  ]);
  const dt = (performance.now() - t0).toFixed(1);
  inputs = {
    'analysis-mini': analysis,
    'customer-mini': customer,
    'product-mini': product,
  };
  log(`parquets fetched in ${dt} ms — analysis ${analysis.length} B, customer ${customer.length} B, product ${product.length} B`);

  log('fetching M source…');
  sourceEl.value = await fetchText('/parqs/mini-wasm.m');
  log('ready — press Run');
  runBtn.disabled = false;
})().catch(e => log(`startup error: ${e.message ?? e}`));

runBtn.addEventListener('click', async () => {
  // `run()` is synchronous and blocks the main thread for the whole
  // query; without yielding first, the browser never paints these UI
  // updates before the call. requestAnimationFrame gives it one frame.
  runBtn.disabled = true;
  runBtn.textContent = 'Running…';
  resultEl.textContent = 'running…';
  log('run started — main thread will block until done');
  await new Promise(requestAnimationFrame);
  await new Promise(requestAnimationFrame);

  const t0 = performance.now();
  try {
    const sexpr = run(sourceEl.value, inputs);
    const dt = (performance.now() - t0).toFixed(1);
    log(`run completed in ${dt} ms — ${sexpr.length} chars of sexpr`);
    resultEl.textContent = sexpr;
  } catch (e) {
    const dt = (performance.now() - t0).toFixed(1);
    log(`run failed in ${dt} ms`);
    resultEl.textContent = `error: ${e}`;
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = 'Run';
  }
});
</script>

</body>
</html>
