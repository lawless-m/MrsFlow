<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>mrsflow — browser demo</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
  h1 { margin: 0 0 .5rem; font-size: 1.2rem; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  textarea { width: 100%; height: 22rem; font-family: ui-monospace, monospace; font-size: .85rem; }
  pre { background: #f4f4f4; padding: .5rem; overflow: auto; max-height: 22rem; font-size: .8rem; }
  #status { white-space: pre-wrap; background: #222; color: #c8f0c8; padding: .5rem; font-family: ui-monospace, monospace; font-size: .8rem; min-height: 6rem; }
  button { padding: .5rem 1rem; font-size: 1rem; margin: .5rem 0; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  label { font-weight: bold; font-size: .9rem; display: block; margin-top: 1rem; }
</style>
</head>
<body>

<h1>mrsflow — browser demo</h1>
<p>Three parquets joined and expanded by an M query, evaluated entirely in the browser via WASM.</p>

<label>Dataset</label>
<div id="dataset-toggle">
  <label style="font-weight: normal; display: inline-block; margin-right: 1rem;">
    <input type="radio" name="dataset" value="mini" checked> mini (~9 MB total)
  </label>
  <label style="font-weight: normal; display: inline-block;">
    <input type="radio" name="dataset" value="FULL"> FULL (~305 MB total — first switch fetches and caches)
  </label>
</div>

<label>Status</label>
<pre id="status"></pre>

<button id="run" disabled>Run</button>

<div class="row">
  <div>
    <label for="source">M source (editable)</label>
    <textarea id="source" spellcheck="false"></textarea>
  </div>
  <div>
    <label for="result">Result (S-expression)</label>
    <pre id="result">—</pre>
  </div>
</div>

<script type="module">
import init, { run, version } from '/mrsflow-wasm/pkg/mrsflow_wasm.js';

const statusEl = document.getElementById('status');
const sourceEl = document.getElementById('source');
const resultEl = document.getElementById('result');
const runBtn = document.getElementById('run');

const log = (msg) => { statusEl.textContent += msg + '\n'; };

async function fetchBytes(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch ${url}: ${r.status}`);
  return new Uint8Array(await r.arrayBuffer());
}

async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`fetch ${url}: ${r.status}`);
  return await r.text();
}

let inputs = null;
let activeVariant = null;
// Per-variant cache: variant -> [analysis, customer, product] once fetched.
const datasetCache = {};

// M source binds to these names regardless of which underlying parquet
// is loaded — the toggle swaps the bytes, not the binding identifiers.
const BINDINGS = ['analysis-mini', 'customer-mini', 'product-mini'];
const VARIANT_PATHS = {
  mini: ['/parqs/analysis-mini.parquet', '/parqs/customer-mini.parquet', '/parqs/product-mini.parquet'],
  FULL: ['/parqs/analysis-mini-FULL.parquet', '/parqs/customer-mini-FULL.parquet', '/parqs/product-mini-FULL.parquet'],
};

async function loadVariant(variant) {
  if (datasetCache[variant]) {
    log(`switching to ${variant} (cached)`);
    return datasetCache[variant];
  }
  log(`fetching ${variant} parquets…`);
  const t0 = performance.now();
  const [a, c, p] = await Promise.all(VARIANT_PATHS[variant].map(fetchBytes));
  const dt = (performance.now() - t0).toFixed(1);
  log(`${variant} fetched in ${dt} ms — analysis ${a.length} B, customer ${c.length} B, product ${p.length} B`);
  const bytes = [a, c, p];
  datasetCache[variant] = bytes;
  return bytes;
}

async function activateVariant(variant) {
  runBtn.disabled = true;
  try {
    const [a, c, p] = await loadVariant(variant);
    inputs = { [BINDINGS[0]]: a, [BINDINGS[1]]: c, [BINDINGS[2]]: p };
    activeVariant = variant;
    log(`active dataset: ${variant}`);
  } catch (e) {
    log(`failed to load ${variant}: ${e.message ?? e}`);
    // Snap the radio back to whatever's actually active.
    if (activeVariant) {
      document.querySelector(`input[name=dataset][value=${activeVariant}]`).checked = true;
    }
  } finally {
    runBtn.disabled = inputs === null;
  }
}

document.querySelectorAll('input[name=dataset]').forEach(el => {
  el.addEventListener('change', e => { if (e.target.checked) activateVariant(e.target.value); });
});

(async () => {
  log('loading wasm…');
  await init();
  log(`wasm loaded — mrsflow-wasm v${version()}`);

  await activateVariant('mini');

  log('fetching M source…');
  sourceEl.value = await fetchText('/parqs/mini-wasm.m');
  log('ready — press Run');
  runBtn.disabled = false;
})().catch(e => log(`startup error: ${e.message ?? e}`));

runBtn.addEventListener('click', async () => {
  // `run()` is synchronous and blocks the main thread for the whole
  // query; without yielding first, the browser never paints these UI
  // updates before the call. requestAnimationFrame gives it one frame.
  runBtn.disabled = true;
  runBtn.textContent = 'Running…';
  resultEl.textContent = 'running…';
  log('run started — main thread will block until done');
  await new Promise(requestAnimationFrame);
  await new Promise(requestAnimationFrame);

  const t0 = performance.now();
  try {
    const sexpr = run(sourceEl.value, inputs);
    const dt = (performance.now() - t0).toFixed(1);
    log(`run completed in ${dt} ms — ${sexpr.length} chars of sexpr`);
    resultEl.textContent = sexpr;
  } catch (e) {
    const dt = (performance.now() - t0).toFixed(1);
    log(`run failed in ${dt} ms`);
    resultEl.textContent = `error: ${e}`;
  } finally {
    runBtn.disabled = false;
    runBtn.textContent = 'Run';
  }
});
</script>

</body>
</html>
