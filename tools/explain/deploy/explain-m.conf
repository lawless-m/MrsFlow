# explain-m.conf — Apache config for the M error explainer.
#
# Drops in /etc/apache2/proxy-conf.d/ following the convention of the
# other ScriptAlias-based CGI services on this host (devblog,
# export-briefings). Loaded by apache2.conf's IncludeOptional.

ScriptAlias /m-explain /usr/lib/cgi-bin/explain-m.cgi
